# NorenDigital — nginx rate & connection limits (http context).
# Install: ops/ubuntu/apply-ddos-protection.sh

# Client key: real visitor IP from Cloudflare when proxied, else remote_addr.
map $http_cf_connecting_ip $cp_limit_key {
    default $binary_remote_addr;
    ""      $binary_remote_addr;
    ~.+     $http_cf_connecting_ip;
}

map $http_cf_connecting_ip $cp_conn_key {
    default $binary_remote_addr;
    ""      $binary_remote_addr;
    ~.+     $http_cf_connecting_ip;
}

# General site + SPA
limit_req_zone $cp_limit_key zone=cp_general:20m rate=30r/s;

# Merchant / public API
limit_req_zone $cp_limit_key zone=cp_api:20m rate=12r/s;

# Hosted checkout /pay/*
limit_req_zone $cp_limit_key zone=cp_pay:20m rate=8r/s;

# Login / register / password
limit_req_zone $cp_limit_key zone=cp_auth:10m rate=3r/s;

# Concurrent TCP connections per client (nginx layer, before uvicorn)
limit_conn_zone $cp_conn_key zone=cp_conn:20m;
