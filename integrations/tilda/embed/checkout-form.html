<!--
  Tilda Zero Block: HTML-форма оплаты.
  Замените BRIDGE_URL и FORM_SECRET на свои значения.
  Action формы — ваш PHP-bridge (integrations/tilda/bridge/index.php).
-->
<div class="noren-tilda-pay" style="max-width:420px;margin:0 auto;font-family:Arial,sans-serif;">
  <form method="POST" action="https://YOUR-DOMAIN.com/noren-bridge/">
    <input type="hidden" name="secret" value="YOUR-FORM-SECRET">
    <input type="hidden" name="order_id" value="">
    <label style="display:block;margin-bottom:8px;">
      Сумма (USD)
      <input type="number" name="amount" min="1" step="0.01" required
        style="width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;margin-top:4px;">
    </label>
    <label style="display:block;margin-bottom:16px;">
      Email
      <input type="email" name="email" required
        style="width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;margin-top:4px;">
    </label>
    <button type="submit"
      style="width:100%;padding:14px;background:#111;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:16px;">
      Оплатить криптовалютой
    </button>
  </form>
</div>
<script>
  (function () {
    var input = document.querySelector('.noren-tilda-pay input[name="order_id"]');
    if (input && !input.value) {
      input.value = 'tilda-' + Date.now().toString(36);
    }
  })();
</script>
